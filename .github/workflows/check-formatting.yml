name: Check Formatting

on: [push, pull_request]

jobs:
  formatting-check:
    name: Check Formatting
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run clang-format style check
        uses: jidicula/clang-format-action@v4.18.0
        with:
          check-path: "src"
